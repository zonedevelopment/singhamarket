apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
//import com.android.build.OutputFile

def hermesEnabled = project.hasProperty("hermesEnabled") ? project.getProperty("hermesEnabled").toBoolean() : true
project.ext.react = [
        enableHermes: hermesEnabled
]
ext.hermesEnabled = hermesEnabled

react {
    autolinkLibrariesWithApp()
}

def enableSeparateBuildPerCPUArchitecture = false
def enableProguardInReleaseBuilds = false
//def jscFlavor = 'org.webkit:android-jsc:+'
//def enableHermes = project.ext.react.get("enableHermes", false)

android {
    namespace "th.co.zoneidea.sunplaza"
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "th.co.zoneidea.sunplaza"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 47
        versionName "1.1.0"
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false
            include "armeabi-v7a", "x86", "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            // แนะนำให้ย้ายไปใช้ key.properties ภายหลัง
            storeFile file('singha.keystore')
            storePassword 'Development2018'
            keyAlias 'zoneidea'
            keyPassword 'Development2018'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

//    packagingOptions {
//        pickFirst "lib/armeabi-v7a/libc++_shared.so"
//        pickFirst "lib/arm64-v8a/libc++_shared.so"
//        pickFirst "lib/x86/libc++_shared.so"
//        pickFirst "lib/x86_64/libc++_shared.so"
//    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

//    applicationVariants.all { variant ->
//        variant.outputs.each { output ->
//            def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
//            def abi = output.getFilter(OutputFile.ABI)
//            if (abi != null) {
//                output.versionCodeOverride = versionCodes.get(abi) * 1048576 + defaultConfig.versionCode
//            }
//        }
//    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

configurations.all {
    exclude group: 'com.google.firebase', module: 'firebase-iid'
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation("org.webkit:android-jsc:+")
    }

    implementation("com.google.firebase:firebase-messaging:${rootProject.ext.firebaseMessagingVersion}")
    implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.0.0")
}

