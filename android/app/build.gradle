dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])

//    implementation "com.facebook.react:react-native:+"
//    implementation "com.facebook.react:react-native:${rootProject.ext.reactNativeVersion}"
    implementation "com.facebook.react:react-android:${rootProject.ext.reactNativeVersion}"
    implementation 'com.android.support:multidex:1.0.3'
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"

    implementation project(':react-native-fast-image')
    implementation project(':react-native-image-picker')
    implementation project(':react-native-image-crop-picker')
    implementation project(':react-native-webview')
    implementation project(':@react-native-community_async-storage')
    implementation project(':@react-native-community_cameraroll')
    implementation project(':react-native-fs')
    implementation project(':react-native-reanimated')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-screens')
    implementation project(':@react-native-firebase_app')
//    implementation project(':@react-native-firebase_messaging')
    implementation "com.google.firebase:firebase-messaging:${rootProject.ext.firebaseMessagingVersion}"
    implementation project(':react-native-permissions')
    implementation project(':react-native-safe-area-context')

    implementation project(':react-native-orientation-locker')
//    implementation project(':react-native-push-notification')
    implementation(project(':react-native-push-notification')) {
        exclude group: 'com.google.firebase', module: 'firebase-iid'
    }
    implementation project(':@react-native-firebase_messaging')

    debugImplementation("com.facebook.flipper:flipper:${FLIPPER_VERSION}") {
        exclude group: 'com.facebook.fbjni'
    }
    debugImplementation("com.facebook.flipper:flipper-network-plugin:${FLIPPER_VERSION}") {
        exclude group: 'com.facebook.flipper'
    }
    debugImplementation("com.facebook.flipper:flipper-fresco-plugin:${FLIPPER_VERSION}") {
        exclude group: 'com.facebook.flipper'
    }

    if (enableHermes) {
        def hermesPath = "../../node_modules/hermes-engine/android/"
        debugImplementation files(hermesPath + "hermes-debug.aar")
        releaseImplementation files(hermesPath + "hermes-release.aar")
    } else {
        implementation jscFlavor
    }
}

