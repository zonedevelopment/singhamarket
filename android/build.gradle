buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
//        ndkVersion = "27.1.12297006"
        ndkVersion = "28.0.13004108"
        kotlinVersion = "2.0.21"
        firebaseMessagingVersion = "23.4.1"
        reactNativeVersion = "0.77.0"
    }

    repositories {
        google()
        mavenCentral()
        jcenter()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.8.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

allprojects {
    repositories {
        mavenLocal()
        google()
        mavenCentral()
        jcenter()
        maven { url "https://www.jitpack.io" }
    }
}

subprojects { subproject ->
    afterEvaluate {
        if (subproject.hasProperty("configurations")) {
            subproject.configurations.all { config ->
                resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == "com.google.firebase" &&
                            details.requested.name == "firebase-messaging") {
                        details.useVersion rootProject.ext.firebaseMessagingVersion
                    }
                }
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"