// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "1.7.22"
        firebaseMessagingVersion = "23.4.1"
        reactNativeVersion = "0.62.2"
    }

    repositories {
        google()
        mavenCentral()
        jcenter()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("com.google.gms:google-services:4.4.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        mavenLocal()

        maven {
            url("$rootDir/../node_modules/react-native/android")
        }

        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }

        google()
        mavenCentral()
        jcenter()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects { subproject ->
    afterEvaluate {
        if (subproject.hasProperty("configurations")) {
            subproject.configurations.all {
                resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == "com.facebook.react" &&
                            details.requested.name == "react-native") {
                        details.useVersion rootProject.ext.reactNativeVersion
                        details.because("Force React Native Android version to match app")
                    }
                    if (details.requested.group == "com.google.firebase" &&
                            details.requested.name == "firebase-messaging") {
                        details.useVersion rootProject.ext.firebaseMessagingVersion
                    }
                }
            }
        }
    }
}