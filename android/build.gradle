buildscript {
    ext {
        buildToolsVersion = "31.0.0"
        minSdkVersion = 21
        compileSdkVersion = 31
        targetSdkVersion = 31
        kotlinVersion = "1.6.10"
        firebaseMessagingVersion = "23.4.1"
        reactNativeVersion = "0.68.6"
    }

    repositories {
        google()
        mavenCentral()
        jcenter()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:7.0.4")
        classpath("com.google.gms:google-services:4.3.15")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        mavenLocal()
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/jsc-android/dist") }
        google()
        mavenCentral()
        jcenter()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects { subproject ->
    afterEvaluate {
        if (subproject.hasProperty("configurations")) {
            subproject.configurations.all {
                resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == "com.facebook.react" &&
                            details.requested.name == "react-native") {
                        details.useVersion rootProject.ext.reactNativeVersion
                    }
                    if (details.requested.group == "com.google.firebase" &&
                            details.requested.name == "firebase-messaging") {
                        details.useVersion rootProject.ext.firebaseMessagingVersion
                    }
                }
            }
        }
    }
}